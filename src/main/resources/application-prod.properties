spring.application.name=PI
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Banco para produção (Supabase/PostgreSQL)
spring.datasource.url=${SUPABASE_DB_URL:${SPRING_DATASOURCE_URL:}}
spring.datasource.username=${SUPABASE_DB_USER:${SPRING_DATASOURCE_USERNAME:}}
spring.datasource.password=${SUPABASE_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# E-mail (mantenha senha fora do código)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.thymeleaf.cache=true
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
